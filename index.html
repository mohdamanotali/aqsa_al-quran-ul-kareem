<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#898989" />
    <title>Al-Quran-ul-Kareem</title>
    <link rel="icon" href="icons/favicon.ico" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="src/styles.css">
</head>

<body id="body">
    <main>
        <div id="loader">
            <p>Preparing data.<span>Please wait....</span></p>
        </div>
        <header id="header">
            <div id="top-nav">
                <p>Al-Quran-ul-Kareem<span>القرآن الكريم</span></p>
            </div>
            <div id="bottom-nav">
                <button class="nav-btn active-nav" data-section="chapter">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke-width="1.5" stroke="currentColor"
                        class="size-6" viewBox="3 3.75 18 16.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 0 1 0 3.75H5.625a1.875 1.875 0 0 1 0-3.75Z">
                        </path>
                    </svg>
                </button>
                <button class="nav-btn" data-section="bookmark">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke-width="1.5" stroke="currentColor"
                        class="size-6" viewBox="3.75 2.25 16.5 19.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z">
                        </path>
                    </svg>
                </button>
                <button class="nav-btn" data-section="search">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke-width="1.5" stroke="currentColor"
                        class="size-6" viewBox="2.25 2.25 19.5 19.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z">
                        </path>
                    </svg>
                </button>
            </div>
        </header>
        <section id="index">
            <div id="chapter" class="data-section">
            </div>
            <div id="bookmark" class="data-section d-none">
            </div>
            <div id="search" class="data-section d-none">
                <div id="go-to">
                    <select id="goto-chapter"></select>
                    <div>
                        <input id="goto-verse" type="text" data-min="1" data-max="3" placeholder="Verse No." />
                        <button id="goto-btn">Go-To</button>
                    </div>
                </div>
                <div id="page-preview">
                    <label>Page-Preview</label>
                    <div id="pp-wrap">
                        <p id="pp-ar">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</p>
                        <p id="pp-en">In the name of Allah, the Entirely Merciful, the Especially Merciful</p>
                        <p id="pp-bn">শুরু করছি আল্লাহর নামে যিনি পরম করুণাময়, অতি দয়ালু।</p>
                    </div>
                </div>
                <div class="config">
                    <label>&#10070; Background color</label>
                    <div>
                        <input type="radio" name="bg-color" value="FAF7F2" id="bgColor1">
                        <label for="bgColor1" class="bg-color bgColor1">&nbsp;</label>
                        <input type="radio" name="bg-color" value="F4F1EA" id="bgColor2">
                        <label for="bgColor2" class="bg-color bgColor2">&nbsp;</label>
                        <input type="radio" name="bg-color" value="FFF8E7" id="bgColor3">
                        <label for="bgColor3" class="bg-color bgColor3">&nbsp;</label>
                        <input type="radio" name="bg-color" value="F1E7D0" id="bgColor4">
                        <label for="bgColor4" class="bg-color bgColor4">&nbsp;</label>
                        <input type="radio" name="bg-color" value="FFF" id="bgColor5">
                        <label for="bgColor5" class="bg-color bgColor5">&nbsp;</label>
                    </div>
                </div>
                <div class="config">
                    <label>&#10070; Arabic font &amp; size</label>
                    <div>
                        <select id="arfontfamily" class="select-list">
                            <option value="" disabled>Font</option>
                            <option value="Hafs">Hafs</option>
                            <option value="Majeed">Majeed</option>
                            <option value="Mushaf">Mushaf</option>
                        </select>
                        <select id="arfontsize" class="select-list">
                            <option value="" disabled>Size</option>
                            <option value="24">24</option>
                            <option value="28">28</option>
                            <option value="32">32</option>
                            <option value="36">36</option>
                            <option value="40">40</option>
                        </select>
                    </div>
                </div>
                <div class="config">
                    <label>&#10070; English font &amp; size</label>
                    <div>
                        <select id="enfontfamily" class="select-list">
                            <option value="" disabled>Font</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Open Sans">Open Sans</option>
                            <option value="Times New Roman">Times New Roman</option>
                        </select>
                        <select id="enfontsize" class="select-list">
                            <option value="" disabled>Size</option>
                            <option value="12">12</option>
                            <option value="14">14</option>
                            <option value="16">16</option>
                            <option value="18">18</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                </div>
                <div class="config">
                    <label>&#10070; Bangla font &amp; size</label>
                    <div>
                        <select id="bnfontfamily" class="select-list">
                            <option value="" disabled>Font</option>
                            <option value="Bornomala">Bornomala</option>
                            <option value="July">July</option>
                            <option value="Purno">Purno</option>
                        </select>
                        <select id="bnfontsize" class="select-list">
                            <option value="" disabled>Size</option>
                            <option value="14">14</option>
                            <option value="16">16</option>
                            <option value="18">18</option>
                            <option value="20">20</option>
                            <option value="22">22</option>
                        </select>
                    </div>
                </div>
                <div class="config" id="imp-exp">
                    <label>&#10070; Bookmark</label>
                    <div>
                        <input type="file" id="importFile" accept=".json" />
                        <button onclick="importBookmark()">Import</button>
                        <button onclick="exportBookmark()">Export</button>
                    </div>
                </div>
                <div id="reset">
                    <button onclick="resetCache()">Reset &amp; Clear Cache</button>
                </div>
                <footer>
                    <span>Version 1.3.2</span>
                    <a href="https://github.com/mohdamanotali">github.com/mohdamanotali</a>
                </footer>
            </div>
        </section>
        <div id="last-read" data-chapter="" data-verse="">
            <p>Last Read &nbsp;&#10095;</p>
            <span></span>
        </div>
        <section id="verse" class="d-none">
            <nav id="nav">
                <div>
                    <button id="back-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="#FAF9F6" class="size-6"
                            viewBox="1.97 3.75 20.53 16.5">
                            <path fill-rule="evenodd"
                                d="M2.515 10.674a1.875 1.875 0 0 0 0 2.652L8.89 19.7c.352.351.829.549 1.326.549H19.5a3 3 0 0 0 3-3V6.75a3 3 0 0 0-3-3h-9.284c-.497 0-.974.198-1.326.55l-6.375 6.374ZM12.53 9.22a.75.75 0 1 0-1.06 1.06L13.19 12l-1.72 1.72a.75.75 0 1 0 1.06 1.06l1.72-1.72 1.72 1.72a.75.75 0 1 0 1.06-1.06L15.31 12l1.72-1.72a.75.75 0 1 0-1.06-1.06l-1.72 1.72-1.72-1.72Z"
                                clip-rule="evenodd"></path>
                        </svg>
                    </button>
                </div>
                <div id="nav-title"></div>
                <div id="prev-next-btn">
                    <button class="prev-next-btn prev-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="#FAF9F6" class="size-6"
                            viewBox="4.21 3.78 15.29 16.45">
                            <path fill-rule="evenodd"
                                d="M19.5 5.653c0-1.427-1.529-2.33-2.779-1.643L5.18 10.357c-1.295.712-1.295 2.573 0 3.286l11.54 6.347c1.25.687 2.779-.217 2.779-1.643V5.653Z"
                                clip-rule="evenodd"></path>
                        </svg>
                    </button>
                    <button class="prev-next-btn next-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="#FAF9F6" class="size-6"
                            viewBox="4.5 3.78 15.29 16.45">
                            <path fill-rule="evenodd"
                                d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z"
                                clip-rule="evenodd"></path>
                        </svg>
                    </button>
                </div>
            </nav>
            <div id="page">
            </div>
        </section>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                //.then(() => console.log('Service Worker Registered'))
                .catch(err => console.error('Service Worker registration failed:', err));
        }
    </script>
    <script src="src/scripts.js"></script>
</body>

</html>
